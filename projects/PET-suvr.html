  <link rel="stylesheet" href="../assets/css/main.css" />

  <style>
    .fade-in {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.85s ease, transform 0.85s ease;
    }

    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 22px;
      margin-top: 18px;
      align-items: start;
    }

    @media (max-width: 980px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }

    .info-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 55px rgba(0,0,0,0.22);
      backdrop-filter: blur(10px);
    }

    .info-box h3 {
      margin-top: 0;
      font-size: 1.05rem;
      color: white;
    }

    .info-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.78);
    }

    .info-list li strong {
      color: rgba(255,255,255,0.92);
    }

    .section-block {
      margin-top: 24px;
      padding: 20px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.02);
      transition: 0.3s ease;
    }

    .section-block:hover {
      border-color: rgba(0, 200, 255, 0.55);
      box-shadow: 0 0 0 2px rgba(0,200,255,0.18);
    }

    .section-block h2 {
      margin-top: 0;
      font-size: 1.3rem;
      color: white;
    }

    .section-block p {
      color: rgba(255,255,255,0.75);
      line-height: 1.7;
      max-width: 80ch;
    }

    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .badge {
      font-size: 0.82rem;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.82);
    }

    .badge.team {
      border-color: rgba(0,200,255,0.55);
      color: rgba(0,200,255,0.95);
      background: rgba(0,200,255,0.1);
    }

    .badge.individual {
      border-color: rgba(140,160,255,0.55);
      color: rgba(170,190,255,0.95);
      background: rgba(120,140,255,0.1);
    }

    .badge.status {
      border-color: rgba(0,255,140,0.35);
      color: rgba(0,255,140,0.85);
      background: rgba(0,255,140,0.08);
    }

    .mini-links {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mini-links a {
      font-size: 0.95rem;
    }
  </style>
</head>
